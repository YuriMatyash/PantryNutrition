<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pantry - Pantry Recipe Agent</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="top-nav"></div>
  <main class="container">
    <div class="app-header">
      <div>
        <h1>Your Pantry</h1>
        <p id="user-info" class="small-note"></p>
      </div>
      <div class="button-row">
        <a class="button-link secondary" href="recipes.html">Go to Recipes</a>
        <a class="button-link" href="generate.html">Go to Generate</a>
      </div>
    </div>
    <p class="small-note">Add ingredients with only g, ml, and unit.</p>

    <section class="section-card">
      <h2>Ingredients</h2>
      <div id="pantry-rows"></div>
      <div id="pantry-empty" class="empty-state" style="display:none;">
        <div class="icon-dot">+</div>
        <p>No pantry items yet.</p>
        <button type="button" class="btn-secondary" onclick="document.getElementById('add-row-btn').click()">Add first ingredient</button>
      </div>
      <div class="button-row" style="margin-top:12px;">
        <button id="add-row-btn" type="button">Add Row</button>
        <button id="save-pantry-btn" type="button">Save Pantry</button>
      </div>
    </section>

    <p id="message"></p>
  </main>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/pantry.js"></script>
</body>
</html>
