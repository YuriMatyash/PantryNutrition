<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pantry - Pantry Recipe Agent</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="top-nav"></div>
  <main class="container">
    <h1>Your Pantry</h1>
    <p id="user-info"></p>
    <p class="small-note">Add ingredients using only g, ml, or unit.</p>

    <div id="pantry-rows"></div>
    <p id="pantry-empty" class="empty-state" style="display:none;">No pantry items yet. Add your first ingredient row.</p>

    <div class="button-row">
      <button id="add-row-btn" type="button">Add Row</button>
      <button id="save-pantry-btn" type="button">Save Pantry</button>
      <a class="button-link" href="generate.html">Go to Generate</a>
      <a class="button-link" href="recipes.html">Go to Recipes</a>
    </div>

    <p id="message"></p>
  </main>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/pantry.js"></script>
</body>
</html>
