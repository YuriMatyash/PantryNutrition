<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Pantry Recipe Agent</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="container">
    <h1>Login</h1>
    <form id="login-form">
      <label>Username <input id="username" type="text" required /></label>
      <label>Password <input id="password" type="password" required /></label>
      <button type="submit">Login</button>
    </form>
    <p id="message"></p>
    <p>No account? <a href="register.html">Register</a></p>
  </main>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
