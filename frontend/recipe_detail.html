<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recipe Detail - Pantry Recipe Agent</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="top-nav"></div>
  <main class="container">
    <p><a href="recipes.html">← Back to Recipes</a></p>
    <section class="section-card">
      <h1 id="recipe-title">Recipe</h1>
      <p id="detail-message"></p>
    </section>

    <section id="recipe-content" style="display:none;">
      <section class="section-card">
        <h2>Nutrition Summary</h2>
        <div class="nutrition-grid">
          <div class="nutrition-card"><strong>Calories</strong><span id="nutrition-calories"></span></div>
          <div class="nutrition-card"><strong>Protein (g)</strong><span id="nutrition-protein"></span></div>
          <div class="nutrition-card"><strong>Carbs (g)</strong><span id="nutrition-carbs"></span></div>
          <div class="nutrition-card"><strong>Fat (g)</strong><span id="nutrition-fat"></span></div>
        </div>
        <p><strong>Servings:</strong> <span id="recipe-servings"></span></p>
      </section>

      <section class="section-card">
        <h2>Ingredients</h2>
        <table>
          <thead><tr><th>Name</th><th>Amount</th><th>Unit</th></tr></thead>
          <tbody id="ingredients-body"></tbody>
        </table>
      </section>

      <section class="section-card">
        <h2>Instructions</h2>
        <ol id="instructions-list"></ol>
      </section>

      <section class="section-card">
        <h2>Edit Recipe</h2>
        <p>Try: "Make it lower calorie", "Make it for 2 servings", "Replace milk with water".</p>
        <textarea id="edit-message" rows="3" placeholder="Type your edit request..."></textarea>
        <button id="edit-recipe-btn" type="button">Send Edit Request</button>
        <p id="edit-status"></p>
      </section>

      <section id="nutrition-warning-section" class="section-card" style="display:none;">
        <h2>Nutrition Warnings</h2>
        <ul id="nutrition-warning-list"></ul>
      </section>

      <section id="missing-section" class="section-card" style="display:none;">
        <h2>Missing Ingredients</h2>
        <ul id="missing-list"></ul>
      </section>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/recipe_detail.js"></script>
</body>
</html>
