<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generate Recipe - Pantry Recipe Agent</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="top-nav"></div>
  <main class="container">
    <h1>Generate Recipe</h1>
    <p class="small-note">AI Recipe Assistant powered by your pantry and preference controls.</p>
    <p id="pantry-help" class="small-note"></p>

    <section class="section-card">
      <form id="generate-form">
        <label>Meal Type
          <select id="meal_type"><option>breakfast</option><option>lunch</option><option>dinner</option></select>
        </label>
        <label>Preference
          <select id="preference">
            <option>high calorie</option><option>low calorie</option><option>high protein</option><option>low protein</option>
            <option>vegetarian</option><option>cheap</option><option>quick meal</option><option>breakfast</option><option>lunch</option><option>dinner</option>
          </select>
        </label>
        <label>Ingredient Policy
          <select id="use_only_pantry">
            <option value="true">Use only pantry ingredients</option>
            <option value="false">Allow missing suggested ingredients</option>
          </select>
        </label>
        <label>Your request
          <textarea id="message_input" placeholder="I want something easy and filling."></textarea>
        </label>
        <button id="generate-btn" type="submit">✨ Generate Recipe</button>
        <div id="generate-status" class="status-box" aria-live="polite"></div>
      </form>
    </section>

    <p id="message"></p>
    <div id="generated-recipe"></div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/generate.js"></script>
</body>
</html>
