<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - PantryAI</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="top-nav"></div>
  <main class="page-wrap auth-wrap">
    <section class="auth-card">
      <div class="auth-icon orange">✨</div>
      <h1>Create your account</h1>
      <p class="small-note">Start building pantry-based AI recipes with nutrition estimates.</p>
      <form id="register-form">
        <label>Username <input id="username" type="text" required /></label>
        <label>Password <input id="password" type="password" required /></label>
        <button class="w-full" type="submit">Register</button>
      </form>
      <p id="message"></p>
      <p class="small-note">Already have an account? <a href="login.html">Login</a></p>
    </section>
  </main>
  <script src="js/config.js"></script><script src="js/api.js"></script><script src="js/auth.js"></script><script src="js/nav.js"></script>
</body>
</html>
